<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Index Analysis — Antigravity</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">ANTIGRAVITY</div>
            <nav id="category-nav">
                <div class="nav-item active" onclick="switchCategory(this, '')">OVERVIEW</div>
                <div class="nav-item" onclick="switchCategory(this, 'Equity')">EQUITY FUNDS</div>
                <div class="nav-item" onclick="switchCategory(this, 'Debt')">DEBT FUNDS</div>
                <div class="nav-item" onclick="switchCategory(this, 'Hybrid')">HYBRID</div>
            </nav>
            
            <div class="fund-list-container">
                <div class="card-title" style="margin-bottom: 0.5rem; font-size: 0.7rem;">Top Funds in Segment</div>
                <div id="fund-selector-list" class="fund-selector">
                    <!-- Funds will be injected here -->
                </div>
            </div>

            <div style="margin-top: auto;">
                <button class="refresh-btn" onclick="refreshData()">REFRESH MART</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1 class="dashboard-title">Fund <span id="category-label">Index</span> Analysis</h1>
                <div id="last-updated" style="font-family: 'DM Mono'; font-size: 0.7rem; color: var(--muted);">LAST SYNC: JUST NOW</div>
            </header>

            <div class="card-grid" id="kpi-grid">
                <div class="card">
                    <div class="card-title">Benchmark</div>
                    <div class="card-value">NIFTY 50</div>
                </div>
                <div class="card">
                    <div class="card-title">Current Index Value</div>
                    <div class="card-value" id="index-val">Loading...</div>
                </div>
                <div class="card">
                    <div class="card-title">Target Deviation</div>
                    <div class="card-value deviation-positive" id="avg-dev">...</div>
                </div>
            </div>

            <section class="chart-container">
                <div class="chart-header">
                    <div id="selected-fund-name" style="font-family: 'DM Mono'; color: var(--primary); font-size: 0.9rem;">Selecting Fund...</div>
                </div>
                <canvas id="performanceChart"></canvas>
            </section>
        </main>
    </div>

    <script>
        let myChart;
        let currentCategory = '';

        async function loadDashboard(category = '') {
            try {
                const response = await fetch(`/api/funds?category=${category}`);
                const funds = await response.json();
                
                const list = document.getElementById('fund-selector-list');
                list.innerHTML = '';

                if (funds.length > 0) {
                    document.getElementById('index-val').innerText = '22,453.20';
                    
                    funds.slice(0, 15).forEach(fund => {
                        const item = document.createElement('div');
                        item.className = 'fund-item';
                        item.innerText = fund.scheme_name.substring(0, 40) + '...';
                        item.onclick = () => {
                            document.querySelectorAll('.fund-item').forEach(el => el.classList.remove('active'));
                            item.classList.add('active');
                            selectFund(fund);
                        };
                        list.appendChild(item);
                    });

                    // Select the first one by default
                    selectFund(funds[0]);
                    list.firstChild.classList.add('active');
                } else {
                    list.innerHTML = '<div style="color:var(--muted); font-size:0.7rem;">No funds found in this category.</div>';
                }
            } catch (err) {
                console.error('Error loading dashboard:', err);
            }
        }

        async function selectFund(fund) {
            document.getElementById('avg-dev').innerText = (fund.avg_deviation > 0 ? '+' : '') + fund.avg_deviation.toFixed(2) + '%';
            document.getElementById('avg-dev').className = 'card-value ' + (fund.avg_deviation >= 0 ? 'deviation-positive' : 'deviation-negative');
            document.getElementById('selected-fund-name').innerText = fund.scheme_name;
            loadComparison(fund.scheme_code, fund.scheme_name);
        }

        async function switchCategory(el, category) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('category-label').innerText = category || 'Index';
            loadDashboard(category);
        }

        async function loadComparison(code, name) {
            try {
                const response = await fetch(`/api/comparison/${code}`);
                const data = await response.json();
                
                const labels = data.map(d => d.date);
                const fundNav = data.map(d => d.nav);
                const indexVal = data.map(d => d.index_close);

                const ctx = document.getElementById('performanceChart').getContext('2d');
                if (myChart) myChart.destroy();

                myChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Fund NAV',
                                data: fundNav,
                                borderColor: '#66fcf1',
                                backgroundColor: 'rgba(102, 252, 241, 0.1)',
                                fill: true,
                                tension: 0.4,
                                yAxisID: 'y'
                            },
                            {
                                label: 'NIFTY 50',
                                data: indexVal,
                                borderColor: 'rgba(255, 255, 255, 0.3)',
                                borderDash: [5, 5],
                                fill: false,
                                tension: 0.1,
                                yAxisID: 'y1'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { color: '#8d8e90', font: { size: 10 } } },
                            y: { 
                                position: 'left',
                                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                ticks: { color: '#66fcf1' }
                            },
                            y1: {
                                position: 'right',
                                grid: { display: false },
                                ticks: { color: 'rgba(255, 255, 255, 0.5)' }
                            }
                        }
                    }
                });
            } catch (err) {
                console.error('Error loading comparison:', err);
            }
        }

        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.innerText = 'SYNCING...';
            await fetch('/api/refresh', { method: 'POST' });
            btn.innerText = 'SYNC COMPLETE';
            setTimeout(() => btn.innerText = 'REFRESH MART', 2000);
            loadDashboard();
        }

        window.onload = () => loadDashboard();
    </script>
</body>
</html>
